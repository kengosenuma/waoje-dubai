<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="#000000"/>

  <!-- W Letter -->
  <text x="50" y="70" font-family="Arial, sans-serif" font-size="60" font-weight="900" text-anchor="middle" fill="url(#grad1)" letter-spacing="5">W</text>

  <!-- Bottom accent line -->
  <line x1="20" y1="85" x2="80" y2="85" stroke="#FFD700" stroke-width="2" opacity="0.8"/>

  <!-- Decorative dots -->
  <circle cx="30" cy="50" r="2" fill="#FFD700" opacity="0.6"/>
  <circle cx="70" cy="50" r="2" fill="#FFD700" opacity="0.6"/>
</svg>
